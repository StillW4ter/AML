<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acton AML/CTF Workbench</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="rail">
        <div class="brand">
          <div class="mark">A</div>
          <div>
            <strong>Acton AML</strong>
            <span>Insurance broker module</span>
          </div>
        </div>

        <label class="role-picker">
          <span>Employee role</span>
          <select id="roleSelect">
            <option value="operator">ოპერატორი / გამყიდველი</option>
            <option value="officer" selected>AML ოფიცერი</option>
            <option value="admin">ადმინისტრატორი</option>
            <option value="manager">მენეჯერი</option>
            <option value="auditor">აუდიტორი</option>
          </select>
        </label>

        <nav id="nav" class="nav" aria-label="Main navigation"></nav>

        <div class="integration-card">
          <span>03:00 batch window</span>
          <strong id="integrationHealth">All feeds online</strong>
          <small>UN · EU · OFAC · HM Treasury · FMS · PEP</small>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div>
            <p class="eyebrow">AML/CTF module · შპს „აქტონ ინშურანს ბროკერი“</p>
            <h1 id="pageTitle">AML Dashboard</h1>
          </div>
          <div class="top-actions">
            <button id="seedData" class="secondary" type="button">Seed demo</button>
            <button id="runScreening" class="primary" type="button">Run screening</button>
          </div>
        </header>

        <section id="accessNotice" class="notice hidden"></section>

        <section id="dashboardView" class="view"></section>
        <section id="onboardingView" class="view"></section>
        <section id="alertsView" class="view"></section>
        <section id="whitelistView" class="view"></section>
        <section id="monitoringView" class="view"></section>
        <section id="strView" class="view"></section>
        <section id="auditView" class="view"></section>
        <section id="reportsView" class="view"></section>
        <section id="configView" class="view"></section>
      </main>
    </div>

    <dialog id="decisionDialog">
      <form method="dialog" class="dialog-card">
        <h2 id="decisionTitle">Decision</h2>
        <p id="decisionHelp"></p>
        <label class="field full">
          <span>სავალდებულო კომენტარი</span>
          <textarea id="decisionComment" minlength="20" placeholder="მინ. 20 სიმბოლო"></textarea>
        </label>
        <label class="field full">
          <span>დამატებითი დოკუმენტები</span>
          <input id="decisionFiles" type="file" multiple accept=".pdf,.jpg,.jpeg,.png" />
        </label>
        <div class="dialog-actions">
          <button value="cancel" class="secondary" type="submit">Cancel</button>
          <button id="confirmDecision" value="confirm" class="primary" type="submit">Confirm</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
